<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Orbe Cloud - Panel Realtime</title> 
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> 
    <style> 
        :root { --bg: #f0f2f5; --primary: #0078d4; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; } 
        .container { max-width: 500px; margin: 0 auto; display: none; }
        #loginScreen { max-width: 350px; margin: 80px auto; text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); } 
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-main { background: var(--primary); color: white; }
        .btn-send { background: #107c10; color: white; }
        .worker-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .sync-badge { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .sync-true { background: #e1f5fe; color: #0288d1; }
        .sync-false { background: #fff3e0; color: #f57c00; }
    </style>
</head> 
<body> 

<div id="loginScreen">
    <h2>Acceso Orbe Cloud</h2>
    <input type="email" id="emailInput" placeholder="Email de responsable">
    <input type="password" id="passInput" placeholder="Contraseña">
    <button class="btn-main" onclick="handleLogin()">Entrar</button>
</div>

<div class="container" id="mainApp"> 
    <h1>Panel Obra</h1>
    <div class="card">
        <select id="projectSelect" onchange="loadWorkers()"></select>
        <button onclick="addProject()" style="margin-top:5px; background: #eee;">+ Nueva Obra</button>
    </div>

    <button id="btnExport" class="btn-send" onclick="exportAndSend()">SINCRONIZAR CON ONEDRIVE</button>

    <div class="card" style="margin-top: 20px;">
        <form id="workerForm">
            <input type="text" id="wName" placeholder="Nombre completo" required>
            <input type="text" id="wDni" placeholder="DNI">
            <button type="submit" class="btn-main">Registrar en Nube</button>
        </form>
    </div>

    <div id="workerList"></div>
    <button onclick="firebase.auth().signOut()" style="background: none; color: red; margin-top: 20px;">Cerrar Sesión</button>
</div>

<script>
    // 1. CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDWyZlRgjF2vM6AcrFE9882UTzvNhLVWEA",
        authDomain: "orbeasistencia-497bb.firebaseapp.com",
        projectId: "orbeasistencia-497bb",
        storageBucket: "orbeasistencia-497bb.firebasestorage.app",
        messagingSenderId: "676419217442",
        appId: "1:676419217442:web:d77ba32421b68e3b2bc27b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 2. CONTROL DE SESIÓN
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadProjects();
        } else {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    async function handleLogin() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } 
        catch (e) { alert("Error de acceso"); }
    }

    // 3. LÓGICA DE PROYECTOS
    async function loadProjects() {
        const snap = await db.collection('obras').get();
        const select = document.getElementById('projectSelect');
        select.innerHTML = '';
        snap.forEach(doc => {
            select.innerHTML += `<option value="${doc.id}">${doc.id}</option>`;
        });
        loadWorkers();
    }

    async function addProject() {
        const name = prompt("Nombre obra:");
        if (name) {
            await db.collection('obras').doc(name).set({ creado: new Date() });
            loadProjects();
        }
    }

    // 4. LÓGICA DE PERSONAL
    document.getElementById('workerForm').onsubmit = async (e) => {
        e.preventDefault();
        const obra = document.getElementById('projectSelect').value;
        await db.collection('obras').doc(obra).collection('personal').add({
            name: document.getElementById('wName').value,
            dni: document.getElementById('wDni').value,
            asistencia: 'Presente',
            fecha: new Date().toLocaleDateString('es-ES'),
            sincronizado: false 
        });
        document.getElementById('workerForm').reset();
        loadWorkers();
    };

    async function loadWorkers() {
        const obra = document.getElementById('projectSelect').value;
        const container = document.getElementById('workerList');
        if(!obra) return;
        container.innerHTML = 'Cargando personal...';
        const snap = await db.collection('obras').doc(obra).collection('personal').get();
        container.innerHTML = '';
        snap.forEach(doc => {
            const w = doc.data();
            const syncLabel = w.sincronizado ? '<span class="sync-badge sync-true">Nube OK</span>' : '<span class="sync-badge sync-false">Pendiente</span>';
            container.innerHTML += `
                <div class="worker-item" style="border-left-color: ${w.asistencia === 'Presente' ? '#28a745' : '#dc3545'}">
                    <div style="flex-grow:1"><b>${w.name}</b> ${syncLabel}<br><small>${w.dni}</small></div>
                    <div style="display:flex; gap:5px">
                        <button style="padding:8px; width:auto" onclick="toggleAsis('${doc.id}', '${w.asistencia}')">${w.asistencia}</button>
                        <button style="padding:8px; width:auto; background:#ff4d4d; color:white" onclick="deleteWorker('${doc.id}')">🗑️</button>
                    </div>
                </div>`;
        });
    }

    async function deleteWorker(id) {
        const obra = document.getElementById('projectSelect').value;
        if(confirm("¿Borrar este trabajador?")) {
            await db.collection('obras').doc(obra).collection('personal').doc(id).delete();
            loadWorkers();
        }
    }

    async function toggleAsis(id, actual) {
        const obra = document.getElementById('projectSelect').value;
        await db.collection('obras').doc(obra).collection('personal').doc(id).update({
            asistencia: actual === 'Presente' ? 'Ausente' : 'Presente',
            sincronizado: false 
        });
        loadWorkers();
    }

    // 5. ENVÍO A POWER AUTOMATE (HISTORIAL DIARIO)
    async function exportAndSend() {
        const obra = document.getElementById('projectSelect').value;
        const btn = document.getElementById('btnExport');
        if (!obra) return alert("Selecciona una obra primero");

        btn.disabled = true;
        btn.innerText = "SINCRO EN CURSO...";

        try {
            const snap = await db.collection('obras').doc(obra).collection('personal').get();
            let listaPersonal = [];
            let docsIds = [];
            const fechaHoy = new Date().toLocaleDateString('es-ES');

            snap.forEach(doc => {
                const w = doc.data();
                listaPersonal.push({
                    fecha: fechaHoy, 
                    obra: obra,
                    nombre: w.name,
                    dni: w.dni,
                    asistencia: w.asistencia,
                    archivoExcel: `${obra}.xlsx`
                });
                docsIds.push(doc.id);
            });

            if (listaPersonal.length === 0) {
                alert("No hay trabajadores registrados en " + obra);
                btn.disabled = false;
                btn.innerText = "SINCRONIZAR CON ONEDRIVE";
                return;
            }

            // URL ORIGINAL DE TU WEBHOOK
            const webhookURL = "https://default2630e7be8e644fb1b8bab51dbd63ae.72.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/502f9413daff41109d74422980cc42f7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=fdQGV2qsKWxFzTCi_F3wzwupbYecJGSYff0UhGuzdVQ";

            const response = await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(listaPersonal)
            });

            if (response.ok) {
                const batch = db.batch();
                docsIds.forEach(id => {
                    const ref = db.collection('obras').doc(obra).collection('personal').doc(id);
                    batch.update(ref, { sincronizado: true });
                });
                await batch.commit();
                alert(`✅ ¡Éxito! Parte de hoy enviado al Excel de ${obra}`);
                loadWorkers();
            } else {
                alert("❌ Error de servidor: Comprueba que el archivo " + obra + ".xlsx existe en OneDrive.");
            }
        } catch (error) {
            console.error(error);
            alert("❌ Error de conexión.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SINCRONIZAR CON ONEDRIVE";
        }
    }
</script> 
</body> 
</html>
