<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Orbe Cloud - Panel Realtime</title> 
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> 
    <style> 
        :root { --bg: #f0f2f5; --primary: #0078d4; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; } 
        .container { max-width: 500px; margin: 0 auto; display: none; }
        #loginScreen { max-width: 350px; margin: 80px auto; text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); } 
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        .btn-send { background: #107c10; color: white; }
        .worker-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head> 
<body> 

<div id="loginScreen">
    <h2>Acceso Orbe Cloud</h2>
    <input type="email" id="emailInput" placeholder="Email de responsable">
    <input type="password" id="passInput" placeholder="Contraseña">
    <button class="btn-main" onclick="handleLogin()">Entrar</button>
</div>

<div class="container" id="mainApp"> 
    <h1>Panel Obra</h1>
    <div class="card">
        <select id="projectSelect" onchange="loadWorkers()"></select>
        <button onclick="addProject()" style="margin-top:5px; background: #eee;">+ Nueva Obra</button>
    </div>

    <button class="btn-send" onclick="exportAndSend()">GENERAR Y ENVIAR PARTE</button>

    <div class="card">
        <form id="workerForm">
            <input type="text" id="wName" placeholder="Nombre completo" required>
            <input type="text" id="wDni" placeholder="DNI">
            <button type="submit" class="btn-main">Registrar en Nube</button>
        </form>
    </div>

    <div id="workerList"></div>
    <button onclick="firebase.auth().signOut()" style="background: none; color: red;">Cerrar Sesión</button>
</div>

<script>
    // 1. TUS DATOS DE FIREBASE AQUÍ
    const firebaseConfig = {
        apiKey: "AIzaSyDWyZlRgjF2vM6AcrFE9882UTzvNhLVWEA",
  authDomain: "orbeasistencia-497bb.firebaseapp.com",
  projectId: "orbeasistencia-497bb",
  storageBucket: "orbeasistencia-497bb.firebasestorage.app",
  messagingSenderId: "676419217442",
  appId: "1:676419217442:web:d77ba32421b68e3b2bc27b"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 2. Control de Sesión
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadProjects();
        } else {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    async function handleLogin() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } 
        catch (e) { alert("Error de acceso"); }
    }

    // 3. Lógica de Base de Datos
    async function loadProjects() {
        const snap = await db.collection('obras').get();
        const select = document.getElementById('projectSelect');
        select.innerHTML = '';
        snap.forEach(doc => {
            select.innerHTML += `<option value="${doc.id}">${doc.id}</option>`;
        });
        loadWorkers();
    }

    async function addProject() {
        const name = prompt("Nombre obra:");
        if (name) {
            await db.collection('obras').doc(name).set({ creado: new Date() });
            loadProjects();
        }
    }

    document.getElementById('workerForm').onsubmit = async (e) => {
        e.preventDefault();
        const obra = document.getElementById('projectSelect').value;
        await db.collection('obras').doc(obra).collection('personal').add({
            name: document.getElementById('wName').value,
            dni: document.getElementById('wDni').value,
            asistencia: 'Presente',
            fecha: new Date().toLocaleDateString()
        });
        document.getElementById('workerForm').reset();
        loadWorkers();
    };

    async function loadWorkers() {
        const obra = document.getElementById('projectSelect').value;
        const container = document.getElementById('workerList');
        container.innerHTML = 'Cargando...';
        const snap = await db.collection('obras').doc(obra).collection('personal').get();
        container.innerHTML = '';
        snap.forEach(doc => {
            const w = doc.data();
            container.innerHTML += `
                <div class="worker-item" style="border-left-color: ${w.asistencia === 'Presente' ? '#28a745' : '#dc3545'}">
                    <div><b>${w.name}</b><br><small>${w.dni}</small></div>
                    <button onclick="toggleAsis('${doc.id}', '${w.asistencia}')">${w.asistencia}</button>
                </div>`;
        });
    }

    async function toggleAsis(id, actual) {
        const obra = document.getElementById('projectSelect').value;
        await db.collection('obras').doc(obra).collection('personal').doc(id).update({
            asistencia: actual === 'Presente' ? 'Ausente' : 'Presente'
        });
        loadWorkers();
    }

    // El exportar se mantiene igual pero tomando datos de Firebase
    async function exportAndSend() {
        const obra = document.getElementById('projectSelect').value;
        const snap = await db.collection('obras').doc(obra).collection('personal').get();
        let lista = [];
        snap.forEach(doc => lista.push(doc.data()));

        const ws = XLSX.utils.json_to_sheet(lista);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Parte");
        XLSX.writeFile(wb, `Parte_${obra}.xlsx`);
        
        // Aquí iría el mailto que ya tenemos...
        alert("Excel generado y listo para enviar");
    }
</script> 
</body> 
</html>
